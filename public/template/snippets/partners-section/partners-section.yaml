className: "partners-section"
defaultPlaceholder: "partners-section"
defaults:
  title: "合作伙伴"
formSchema:
  type: "objectWithList"
  groups:
    - type: "object"
      name: "header"
      label: "标题信息"
      fields:
        - key: "title"
          label: "标题"
          type: "text"
          default: "合作伙伴"
          placeholder: "请输入标题"
        - key: "subtitle"
          label: "副标题"
          type: "text"
          default: "与我们携手共创未来"
          placeholder: "请输入副标题"
    - type: "array"
      name: "partners"
      label: "合作伙伴列表"
      itemLabel: "合作伙伴"
      fields:
        - key: "name"
          label: "名称"
          type: "text"
          default: ""
          placeholder: "请输入公司名称"
          required: true
          trim: true
        - key: "logo"
          label: "Logo"
          type: "image"
          default: ""
          placeholder: "请输入Logo URL"
        - key: "website"
          label: "官网"
          type: "text"
          default: ""
          placeholder: "请输入官网地址"
sampleData:
  header:
    title: "合作伙伴"
    subtitle: "与我们携手共创未来"
  partners:
    - name: "阿里巴巴"
      logo: ""
      website: "https://www.alibaba.com"
    - name: "腾讯"
      logo: ""
      website: "https://www.tencent.com"
    - name: "百度"
      logo: ""
      website: "https://www.baidu.com"
    - name: "京东"
      logo: ""
      website: "https://www.jd.com"