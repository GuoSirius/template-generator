<section class="hero-banner" style="background: linear-gradient(135deg, <%= bgColor %> 0%, #16213e 100%); padding: 80px 40px; text-align: center;">
  <h1 style="font-size: 48px; font-weight: 700; margin-bottom: 16px; color: #F8FAFC;"><%= title %></h1>
  <p style="font-size: 20px; color: #94A3B8; max-width: 600px; margin: 0 auto 32px;"><%= subtitle %></p>
  <% if (buttonText) { %>
  <button style="background: linear-gradient(135deg, #38BDF8, #0284C7); color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s;"><%= buttonText %></button>
  <% } %>
</section>
