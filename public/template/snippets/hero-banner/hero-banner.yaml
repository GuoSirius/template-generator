className: "hero-banner"
defaultPlaceholder: "hero-section"
defaults:
  height: "400px"
  bgColor: "#1a1a2e"
formSchema:
  type: "object"
  fields:
    - key: "title"
      label: "标题"
      type: "text"
      default: "Welcome"
      placeholder: "请输入主标题"
      required: true
    - key: "subtitle"
      label: "副标题"
      type: "textarea"
      default: "Build something amazing"
      placeholder: "请输入副标题"
    - key: "bgColor"
      label: "背景颜色"
      type: "select"
      default: "#1a1a2e"
      options:
        - "#1a1a2e"
        - "#16213e"
        - "#0f3460"
        - "#1b1b2f"
        - "#162447"
    - key: "buttonText"
      label: "按钮文字"
      type: "text"
      default: "Get Started"
      placeholder: "留空则不显示按钮"
sampleData:
  title: "Transform Your Ideas"
  subtitle: "Into reality with our powerful tools and intuitive design platform"
  bgColor: "#1a1a2e"
  buttonText: "Get Started"
